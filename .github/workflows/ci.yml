name: CI — Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── Backend unit tests ──────────────────────────────────────────────────────
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "sqlite+aiosqlite:///./test.db"
      REDIS_URL: "redis://localhost:6379/0"
      JWT_SECRET_KEY: "ci-test-secret-key-not-for-production"
      ENCRYPTION_KEY: "dGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVz"
      EVOLUTION_API_KEY: "test-evo-key"
      ADMIN_USERNAME: "972500000000"
      ADMIN_PASSWORD: "TestPass123"
      WHATSAPP_PLATFORM_PHONE: "972500000000"
      OPENAI_API_KEY: "sk-test"
      ANTHROPIC_API_KEY: "sk-ant-test"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt aiosqlite fakeredis

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

  # ── Frontend unit tests ─────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: passenger-webapp

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: passenger-webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
