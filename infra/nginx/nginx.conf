# RideOS Platform — Nginx Reverse Proxy
# Serves:
#   /          → passenger webapp
#   /driver/   → driver webapp
#   /api/      → backend FastAPI  (HTTP)
#   /ws/       → backend FastAPI  (WebSocket upgrade)
#   /metrics   → blocked from public (internal only)

worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time';
    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log   warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Security headers (complement what FastAPI sets)
    add_header X-Content-Type-Options   nosniff;
    add_header X-Frame-Options          DENY;
    add_header Referrer-Policy          strict-origin-when-cross-origin;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m   rate=5r/s;

    # ── Upstream definitions ────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }
    upstream driver_app {
        server driver-webapp:80;
    }
    upstream passenger_app {
        server passenger-webapp:80;
    }
    # admin-webapp may not always be running; use resolver so nginx starts regardless
    # upstream admin_app { server admin-webapp:80; }

    # ── HTTP → HTTPS redirect ───────────────────────────────
    server {
        listen 80;
        server_name easytaxiisrael.com www.easytaxiisrael.com driver.easytaxiisrael.com;

        # Let's Encrypt challenge path
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Main HTTPS server ───────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name easytaxiisrael.com www.easytaxiisrael.com;

        # TLS — certs managed by Certbot (see security_guide.md)
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # Block /metrics from public
        location = /metrics {
            return 403;
        }

        # ── API (REST) ───────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass         http://backend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── Auth endpoints — stricter rate limit ─────────────
        location ~ ^/api/auth/otp {
            limit_req zone=auth burst=10 nodelay;
            rewrite ^/api(.*)$ $1 break;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~ ^/api/auth/wa {
            limit_req zone=auth burst=20 nodelay;
            rewrite ^/api(.*)$ $1 break;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── WhatsApp webhook (Evolution API → backend) ───────
        # Evolution API sends to /webhook/whatsapp/<instance>
        # Rewrite to the FastAPI route /whatsapp/webhook
        location ~ ^/webhook/whatsapp/ {
            rewrite ^/webhook/whatsapp/.*$ /whatsapp/webhook break;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── WebSocket (real-time GPS) ────────────────────────
        location /ws/ {
            proxy_pass         http://backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;   # keep WS alive for 1 h
        }

        # ── Compliance file uploads (served by backend) ──────
        location /api/compliance/files/ {
            proxy_pass         http://backend/compliance/files/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
        }

        # ── Admin panel ─────────────────────────────────────
        location /admin/ {
            # admin-webapp not currently deployed — return 503
            return 503 "Admin panel not available";
        }

        # ── Grafana (admin only — internal access only) ─────────────────────
        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Evolution API / WhatsApp (admin only) ────────────
        location /evolution/ {
            proxy_pass         http://evolution-api:8080/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 120s;
        }

        # Keep admin panel fresh after quick hotfixes.
        location = /admin.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            proxy_pass http://passenger_app/admin.html;
            proxy_set_header Host $host;
        }

        location = /whatsapp-setup.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            proxy_pass http://passenger_app/whatsapp-setup.html;
            proxy_set_header Host $host;
        }

        # ── Passenger webapp (root) ──────────────────────────
        location / {
            proxy_pass http://passenger_app/;
            proxy_set_header Host $host;
        }
    }

    # ── Driver subdomain ────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name driver.easytaxiisrael.com;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass         http://backend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location ~ ^/api/auth/otp {
            limit_req zone=auth burst=10 nodelay;
            rewrite ^/api(.*)$ $1 break;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~ ^/api/auth/wa {
            limit_req zone=auth burst=20 nodelay;
            rewrite ^/api(.*)$ $1 break;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /ws/ {
            proxy_pass         http://backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;
        }

        location / {
            proxy_pass http://driver_app/;
            proxy_set_header Host $host;
        }
    }

    # ── ngrok tunnel — Persona webhook testing ─────────────
    # ngrok forwards HTTPS→HTTP to port 80 with the ngrok domain as Host.
    # This block catches those requests and proxies the Persona webhook
    # directly to the backend (no rate-limit, no HTTPS redirect).
    server {
        listen 80;
        server_name word-amicably-parameter.ngrok-free.dev;

        # Persona webhook callback
        location /persona/webhook {
            proxy_pass         http://backend/persona/webhook;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 30s;
        }
    }
}

