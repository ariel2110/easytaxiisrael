<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0f2252"/>
      <stop offset="100%" stop-color="#040912"/>
    </radialGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD000"/>
      <stop offset="55%" stop-color="#F5A800"/>
      <stop offset="100%" stop-color="#C47C00"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE040"/>
      <stop offset="100%" stop-color="#E09500"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#B8E4FF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#5aaed6" stop-opacity="0.75"/>
    </linearGradient>
    <radialGradient id="wheelGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
    <radialGradient id="hubGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ddd"/>
      <stop offset="100%" stop-color="#888"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <ellipse cx="256" cy="300" rx="200" ry="60" fill="#2563EB" opacity="0.12"/>

  <!-- Car body -->
  <g filter="url(#shadow)">
    <path d="M82 290 Q82 270 100 268 L140 268 L172 218 Q180 204 196 202 L316 202 Q332 202 340 218 L372 268 L412 268 Q430 268 430 290 L430 338 Q430 352 416 352 L96 352 Q82 352 82 338 Z" fill="url(#bodyGrad)"/>
    <path d="M172 268 L175 218 Q180 205 196 203 L316 203 Q332 203 337 218 L340 268 Z" fill="url(#roofGrad)"/>
    <rect x="92" y="310" width="328" height="8" rx="4" fill="#FFE566" opacity="0.45"/>
    <line x1="256" y1="270" x2="256" y2="350" stroke="#C47C00" stroke-width="2" opacity="0.5"/>
    <line x1="180" y1="270" x2="180" y2="350" stroke="#C47C00" stroke-width="1.5" opacity="0.35"/>
    <line x1="332" y1="270" x2="332" y2="350" stroke="#C47C00" stroke-width="1.5" opacity="0.35"/>
    <rect x="210" y="305" width="24" height="7" rx="3.5" fill="#C47C00" opacity="0.7"/>
    <rect x="278" y="305" width="24" height="7" rx="3.5" fill="#C47C00" opacity="0.7"/>
  </g>

  <!-- Windshield -->
  <path d="M181 264 L186 222 Q189 211 200 210 L312 210 Q323 211 326 222 L331 264 Z" fill="url(#glassGrad)" stroke="#5aaed6" stroke-width="1.5" opacity="0.9"/>
  <path d="M192 258 L197 225 Q199 216 208 215 L260 215 L255 260 Z" fill="url(#shineGrad)" opacity="0.5"/>
  <line x1="256" y1="210" x2="256" y2="264" stroke="#C47C00" stroke-width="3" opacity="0.6"/>

  <!-- Side windows -->
  <path d="M128 268 L145 240 Q149 232 158 232 L174 232 L174 268 Z" fill="url(#glassGrad)" opacity="0.75"/>
  <path d="M338 232 L354 232 Q363 232 367 240 L384 268 L338 268 Z" fill="url(#glassGrad)" opacity="0.75"/>

  <!-- Taxi sign -->
  <rect x="216" y="188" width="80" height="30" rx="6" fill="#1a1a1a" filter="url(#glow)"/>
  <rect x="218" y="190" width="76" height="26" rx="5" fill="#FFD000"/>
  <text x="256" y="208" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="15" font-weight="900" fill="#111" letter-spacing="1">TAXI</text>

  <!-- Headlights -->
  <ellipse cx="108" cy="296" rx="18" ry="12" fill="#FFF8C0" opacity="0.9"/>
  <ellipse cx="108" cy="296" rx="12" ry="8" fill="#FFE566"/>
  <ellipse cx="108" cy="296" rx="24" ry="16" fill="#FFE566" opacity="0.15" filter="url(#glow)"/>

  <!-- Tail lights -->
  <ellipse cx="404" cy="296" rx="18" ry="12" fill="#FF2222" opacity="0.85"/>
  <ellipse cx="404" cy="296" rx="10" ry="7" fill="#FF6666"/>

  <!-- Grille -->
  <rect x="88" y="330" width="46" height="14" rx="4" fill="#222" opacity="0.7"/>
  <line x1="100" y1="330" x2="100" y2="344" stroke="#444" stroke-width="1.5"/>
  <line x1="112" y1="330" x2="112" y2="344" stroke="#444" stroke-width="1.5"/>
  <line x1="124" y1="330" x2="124" y2="344" stroke="#444" stroke-width="1.5"/>

  <!-- Front wheel -->
  <circle cx="160" cy="354" r="38" fill="url(#wheelGrad)" filter="url(#shadow)"/>
  <circle cx="160" cy="354" r="22" fill="#333"/>
  <circle cx="160" cy="354" r="14" fill="url(#hubGrad)"/>
  <circle cx="160" cy="354" r="5" fill="#aaa"/>
  <line x1="160" y1="340" x2="160" y2="332" stroke="#999" stroke-width="3"/>
  <line x1="160" y1="368" x2="160" y2="376" stroke="#999" stroke-width="3"/>
  <line x1="146" y1="354" x2="138" y2="354" stroke="#999" stroke-width="3"/>
  <line x1="174" y1="354" x2="182" y2="354" stroke="#999" stroke-width="3"/>
  <line x1="150" y1="344" x2="144" y2="338" stroke="#999" stroke-width="2.5"/>
  <line x1="170" y1="364" x2="176" y2="370" stroke="#999" stroke-width="2.5"/>
  <line x1="170" y1="344" x2="176" y2="338" stroke="#999" stroke-width="2.5"/>
  <line x1="150" y1="364" x2="144" y2="370" stroke="#999" stroke-width="2.5"/>

  <!-- Rear wheel -->
  <circle cx="352" cy="354" r="38" fill="url(#wheelGrad)" filter="url(#shadow)"/>
  <circle cx="352" cy="354" r="22" fill="#333"/>
  <circle cx="352" cy="354" r="14" fill="url(#hubGrad)"/>
  <circle cx="352" cy="354" r="5" fill="#aaa"/>
  <line x1="352" y1="340" x2="352" y2="332" stroke="#999" stroke-width="3"/>
  <line x1="352" y1="368" x2="352" y2="376" stroke="#999" stroke-width="3"/>
  <line x1="338" y1="354" x2="330" y2="354" stroke="#999" stroke-width="3"/>
  <line x1="366" y1="354" x2="374" y2="354" stroke="#999" stroke-width="3"/>
  <line x1="342" y1="344" x2="336" y2="338" stroke="#999" stroke-width="2.5"/>
  <line x1="362" y1="364" x2="368" y2="370" stroke="#999" stroke-width="2.5"/>
  <line x1="362" y1="344" x2="368" y2="338" stroke="#999" stroke-width="2.5"/>
  <line x1="342" y1="364" x2="336" y2="370" stroke="#999" stroke-width="2.5"/>

  <!-- Road shadow -->
  <ellipse cx="256" cy="392" rx="190" ry="14" fill="#000" opacity="0.35"/>
</svg>
